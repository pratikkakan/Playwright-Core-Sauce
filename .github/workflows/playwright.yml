name: Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options: [local, staging, production]
      grep:
        description: "Test grep pattern (e.g. @smoke)"
        required: false
        default: ""

env:
  ENV: ${{ github.event.inputs.environment || 'staging' }}
  BASE_URL: ${{ secrets.BASE_URL || 'https://www.saucedemo.com' }}
  USER_PASSWORD: ${{ secrets.USER_PASSWORD || 'secret_sauce' }}
  STANDARD_USER: ${{ secrets.STANDARD_USER || 'standard_user' }}

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps ${{ matrix.project }}

      - name: Run Tests
        run: |
          npx playwright test \
            --project=${{ matrix.project }} \
            ${{ github.event.inputs.grep && format('--grep "{0}"', github.event.inputs.grep) || '' }}

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 14

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.project }}
          path: test-results/
          retention-days: 7
